<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>get your geo location</title>
</head>
<body>
	<p>get your location here</p>
	<button onclick="getlocation()">get location</button>
	<p id="resultlo"></p>

	<script type="text/javascript">
		
		var x = document.getElementById("resultlo");
		function getlocation(){
		  if(navigator.getlocation){
		  	navigator.getlocation.getCurrentPosition(showPosition);
		  }else{
		  	x.innerhtml = "there is an error."


		  }
		}
		function showposition(position) {
			x.innerhtml = "lattitude:"+ position.coords.latitude+ "<br>longitude : "+position.coords.longitude;
		}

	</script>

</body>
</html>
